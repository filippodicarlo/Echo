<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="top">

    <div class="main">
      <div class="site-title">echo</div>
      <div class="word">shared <br> enough <br>
                        to be true</div>
    </div>

    <div class="right-panel">

      <div class="panel-title">live feed</div>

      <div class="search-bar">
        <input
          type="text"
          id="tag-input"
          placeholder="search a topic..."
          autocomplete="off"
        >
        <button id="tag-submit">→</button>
      </div>
    
        <div class="stats" id="stats">
  posts: 0
</div>

<div class="sidebar" id="tweet-list"></div>
        
    </div>

  </div>

  <div class="bottom">

    <div class="caption-wrapper">

      <div class="panel-title">about</div>

      <div class="caption">
        <p>
          Type a topic. The feed loads real messages about it.
          The central text changes shape: heavier when more voices
          speak, taller or shorter as the mood shifts.
          Stop watching. Come back. See what remains.
        </p>
      </div>

    </div>

    <div class="footer">
      © 2026 Filippo Di Carlo | Echo
    </div>

  </div>

<script>

const word = document.querySelector(".word");
const tweetList = document.getElementById("tweet-list");
const tagInput = document.getElementById("tag-input");
const tagSubmit = document.getElementById("tag-submit");
const stats = document.getElementById("stats");

word.style.fontVariationSettings = `"wght" 300, "XHGT" 450`;

let tweets = [];

const decayTime = 3000;

let deliveredCount = 0;
let isFirstLoad = true;
let isUpdating = false;
let pendingTimeouts = [];



function resetFeed(){

    pendingTimeouts.forEach(clearTimeout);
    pendingTimeouts = [];

    tweets = [];

    deliveredCount = 0;

    isFirstLoad = true;

    tweetList.innerHTML = "";
    
    stats.innerHTML = "posts: 0";

    word.style.fontVariationSettings =
        `"wght" 300, "XHGT" 450`;

}


function addPost(post){

    if(document.getElementById(`post-${post.id}`))
        return;

    post.timeAdded = Date.now();

    tweets.push(post);

    const div = document.createElement("div");

    div.id = `post-${post.id}`;

    div.innerHTML = `
        <strong>@${post.user}</strong>
        <span class="time">(${post.date} ${post.time})</span><br>
        ${post.text}
    `;

    tweetList.prepend(div);
    
    updateStats();
    updateWord();

}
    /* conta le lingue*/
function updateStats(){

    const languageCounts = {};

    tweets.forEach(post => {

        const lang = post.language || "unknown";

        languageCounts[lang] =
        (languageCounts[lang] || 0) + 1;

    });


    const total = tweets.length;


    let output = `
        posts: ${total}<br><br>
    `;


    Object.entries(languageCounts)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([lang,count])=>{

        const influence = 
            (count / total).toFixed(2);


        output += `
        ${lang}: ${count} — influence ${influence}<br>
        `;

    });
    
    stats.innerHTML = output;
}


function updateWord(){

    if(tweets.length===0){

        word.style.fontVariationSettings =
        `"wght" 300, "XHGT" 450`;

        return;

    }

    const now = Date.now();
    const languageCounts = {};

    tweets.forEach(post => {

    languageCounts[post.language] =
        (languageCounts[post.language] || 0) + 1;

    });

    let volume = 0;
    let sentiment = 0;
    let totalDecay = 0;

    const languages = {};

    tweets.forEach(post => {
    const lang = post.language || "unknown";
    languages[lang] = (languages[lang] || 0) + 1;
    });

const totalPosts = tweets.length;

    tweets.forEach(post=>{

    const age = now-post.timeAdded;

    const decay = Math.exp(-age/decayTime);
    /*influenza lingua sul font; uso dei logaritmi per evitare che ci sia dominio di una lingua*/
    const languageWeight =
    Math.log2((languageCounts[post.language] || 1) + 1);

    volume += decay * languageWeight;

    sentiment +=
        post.sentiment *
        decay *
        languageWeight;

    totalDecay +=
        decay *
        languageWeight;

    });

    let weight = 300 + Math.min(volume,5)*80;

    weight = Math.max(300,Math.min(700,weight));
    
/* qua controllo l'x-height con sentiment analysis*/
    const avg =
        totalDecay
        ? sentiment/totalDecay
        : 0;

    let xHeight =
        300 + ((avg+1)/2)*200;

    xHeight = Math.max(300,Math.min(600,xHeight));

    word.style.fontVariationSettings =
        `"wght" ${weight}, "XHGT" ${xHeight}`;

}


async function fetchNewPosts(){

    if(isUpdating)
        return;

    try{

        const response =
            await fetch(
            `https://echo-3qpg.onrender.com/api/posts?since=${deliveredCount}`
            );

        const posts =
            await response.json();

        posts.sort(
            (a,b)=>a.timestamp-b.timestamp
        );

        const delay =
            isFirstLoad
            ? 4000
            : 800;

        posts.forEach((post,index)=>{

    const timeout = setTimeout(()=>{

        addPost(post);

    },index*delay);

    pendingTimeouts.push(timeout);

});

        deliveredCount += posts.length;

        isFirstLoad = false;

    }

    catch(err){

        console.warn(err);

    }

}


async function updateTags(){

    const raw =
        tagInput.value.trim();

    if(!raw)
        return;

    isUpdating = true;

    resetFeed();

    const tags = raw
        .split(",")
        .map(t=>t.trim().replace("#",""))
        .filter(Boolean);

    try{

        await fetch(
            "https://echo-3qpg.onrender.com/api/tags",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    tags
                })

            }
        );

        tagInput.value = "";

        await fetchNewPosts();

    }

    catch(err){

        console.warn(err);

    }

    finally{

        isUpdating = false;

    }

}


tagSubmit.addEventListener(
    "click",
    updateTags
);

tagInput.addEventListener(
    "keydown",
    e=>{

        if(e.key==="Enter")
            updateTags();

    }
);

fetchNewPosts();

setInterval(fetchNewPosts,5000);

setInterval(updateWord,500);

</script>

</body>
</html>
